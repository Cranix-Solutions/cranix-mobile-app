<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="status">
      <ion-icon name="stats-chart"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'System status' | translate}}</ion-label>
    </ion-tab-button>
  
    <ion-tab-button tab="services">
      <ion-icon name="pulse"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'System services' | translate}}</ion-label>
    </ion-tab-button>
  
    <ion-tab-button tab="config">
      <ion-icon name="cog"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'Server configuration' | translate}}</ion-label>
    </ion-tab-button>
  
    <ion-tab-button tab="acls">
      <ion-icon name="color-wand"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'Acls' | translate}}</ion-label>
    </ion-tab-button>
  
    <ion-tab-button tab="addons">
      <ion-icon name="hammer"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'Addon modules' | translate}}</ion-label>
    </ion-tab-button>
  
    <ion-tab-button *ngIf="authService.isAllowed('system.mailserver')" tab="mailserver">
      <ion-icon name="mail"></ion-icon>
      <ion-label *ngIf="!authService.isMD()">{{ 'Mailserver' | translate}}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
